<!--
  Coding Agent - Main HTML Entry Point
  =====================================
  
  Purpose:
  --------
  This is the main HTML file for the Coding Agent application. It serves as the
  entry point for the web application, providing the basic DOM structure and
  loading the React application via a JavaScript module.
  
  Structure:
  ----------
  - Standard HTML5 document structure
  - Meta tags for charset and viewport configuration
  - Single root div (#root) for React application mounting
  - ES module script import for the main application entry point (main.jsx)
  
  Dependencies:
  -------------
  - /src/main.jsx: React application entry point
  
  Usage:
  ------
  This file should not be modified frequently. Changes to the application structure
  should be made in the React components and main.jsx file instead.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Coding Agent</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
